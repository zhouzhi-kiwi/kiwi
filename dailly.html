<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICASSP 2026 Spain - 日程管理</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            opacity: 0.8;
        }
        .content {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f1f5f9;
        }
        .tag {
            background-color: #1a237e;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .form-container {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex: 1;
        }
        button {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: #004494; }
        .btn-edit { background-color: #ffc107; color: #333; margin-right: 5px; }
        .btn-edit:hover { background-color: #e0a800; }
        .btn-delete { background-color: #dc3545; color: white; }
        .btn-delete:hover { background-color: #c82333; }
        
        /* Modal for editing */
        .details-cell {
            font-size: 13px;
            color: #555;
            max-width: 300px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ICASSP 2026 - 日程安排</h1>
        <p>Spain | Dynamic Schedule Manager</p>
    </div>
    
    <div class="content">
        <div class="form-container">
            <h3 id="form-title" style="margin-top:0;">添加新日程</h3>
            <form id="schedule-form">
                <input type="hidden" id="edit-id">
                <div class="form-group">
                    <input type="text" id="input-name" placeholder="姓名/报告人 (例如: 陈卓扬)" required>
                    <select id="input-type">
                        <option value="Poster">Poster</option>
                        <option value="Oral">Oral</option>
                        <option value="Keynote">Keynote</option>
                    </select>
                    <input type="text" id="input-time" placeholder="时间 (例如: Thu, 7 May, 09:00 - 11:00)" required>
                </div>
                <div class="form-group">
                    <input type="text" id="input-details" placeholder="会议详细信息 (Session, 论文名, 地点等)" required>
                    <button type="submit" class="btn-primary" id="submit-btn">添加日程</button>
                    <button type="button" class="btn-edit" id="cancel-btn" style="display:none;" onclick="resetForm()">取消</button>
                </div>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>报告人</th>
                    <th>类型</th>
                    <th>时间</th>
                    <th>详细信息 (Session & Location)</th>
                    <th style="width: 120px;">操作</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 初始数据整合了你的文本和图片信息
    let scheduleData = [
        {
            id: 1,
            name: "陈卓扬",
            type: "Poster",
            time: "Thu, 7 May, 09:00 - 11:00",
            details: "IVMSP-P27.7: MSAT: Multi-Scale Semantic-Aligned Transformer... | Location: Poster Area 14"
        },
        {
            id: 2,
            name: "云知声-赵宪",
            type: "Poster",
            time: "Thu, 7 May, 16:30 - 18:30",
            details: "SLP-P44: Multilingual ASR Architectures & Scaling | Location: Poster Area 29"
        },
        {
            id: 3,
            name: "myx",
            type: "Poster",
            time: "Thu, 7 May, 16:30 - 18:30",
            details: "GC-P9: Towards Human-like Spoken Dialogue Systems (HumDial) | Location: Poster Area 43"
        }
    ];

    const tbody = document.getElementById('schedule-body');
    const form = document.getElementById('schedule-form');
    let isEditing = false;

    // 渲染表格
    function renderTable() {
        tbody.innerHTML = '';
        scheduleData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td><span class="tag">${item.type}</span></td>
                <td>${item.time}</td>
                <td class="details-cell">${item.details}</td>
                <td>
                    <button class="btn-edit" onclick="editItem(${item.id})">编辑</button>
                    <button class="btn-delete" onclick="deleteItem(${item.id})">删除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 表单提交处理 (添加或更新)
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const idInput = document.getElementById('edit-id').value;
        const name = document.getElementById('input-name').value;
        const type = document.getElementById('input-type').value;
        const time = document.getElementById('input-time').value;
        const details = document.getElementById('input-details').value;

        if (isEditing) {
            // 更新现有日程
            const index = scheduleData.findIndex(item => item.id == idInput);
            scheduleData[index] = { id: parseInt(idInput), name, type, time, details };
        } else {
            // 添加新日程
            const newId = scheduleData.length > 0 ? Math.max(...scheduleData.map(d => d.id)) + 1 : 1;
            scheduleData.push({ id: newId, name, type, time, details });
        }

        resetForm();
        renderTable();
    });

    // 编辑日程 (将数据填充到表单)
    function editItem(id) {
        const item = scheduleData.find(d => d.id === id);
        if (item) {
            document.getElementById('edit-id').value = item.id;
            document.getElementById('input-name').value = item.name;
            document.getElementById('input-type').value = item.type;
            document.getElementById('input-time').value = item.time;
            document.getElementById('input-details').value = item.details;
            
            document.getElementById('form-title').innerText = "修改日程";
            document.getElementById('submit-btn').innerText = "保存修改";
            document.getElementById('cancel-btn').style.display = "inline-block";
            isEditing = true;
        }
    }

    // 删除日程
    function deleteItem(id) {
        if (confirm("确定要删除这条日程吗？")) {
            scheduleData = scheduleData.filter(item => item.id !== id);
            renderTable();
        }
    }

    // 重置表单状态
    function resetForm() {
        form.reset();
        document.getElementById('edit-id').value = '';
        document.getElementById('form-title').innerText = "添加新日程";
        document.getElementById('submit-btn').innerText = "添加日程";
        document.getElementById('cancel-btn').style.display = "none";
        isEditing = false;
    }

    // 初始化渲染
    renderTable();
</script>

</body>
</html>
